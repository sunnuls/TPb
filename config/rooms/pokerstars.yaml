# PokerStars Room Configuration
# Calibrated for PS Heads-Up windowed table ~1211x870 client area
# (NLHE 100/200, GLFW30 window, modern dark theme)
# Measured from live button positions: Чек≈(895,815), Бет≈(1097,815)
# EDUCATIONAL USE ONLY

room_name: "pokerstars"
resolution: "1211x870"

# ROI Definitions — coordinates are WINDOW-RELATIVE (0,0 = top-left of captured image)
# All coordinates verified for 1211x870 PS HU table window.
#
# To recalibrate: open %TEMP%\ps_table_latest.png (saved every frame),
# measure pixel coordinates in any image viewer, update below.
rois:
  # ── Hero hole cards (bottom of table oval) ───────────────────────────────
  # y=432 starts below the chip marker ("200") that sits above the card face.
  # Verified: K♣ and 10♦ rank visible in top 45% of each 65x95 crop.
  hero_card_1:
    x: 422
    y: 432
    width: 65
    height: 95

  hero_card_2:
    x: 491
    y: 432
    width: 65
    height: 95

  # ── Board cards (centre of table oval) ───────────────────────────────────
  # Board centre at ~30-60% width, ~37-50% height in 1211x870
  board_card_1:
    x: 358
    y: 320
    width: 62
    height: 86

  board_card_2:
    x: 430
    y: 320
    width: 62
    height: 86

  board_card_3:
    x: 502
    y: 320
    width: 62
    height: 86

  board_card_4:
    x: 574
    y: 320
    width: 62
    height: 86

  board_card_5:
    x: 646
    y: 320
    width: 62
    height: 86

  # ── Pot/bank (above board, centre) ────────────────────────────────────────
  # "Банк: 380" text appears around 40-60% width, 25-30% height
  pot:
    x: 450
    y: 215
    width: 220
    height: 36

  # ── Stacks ────────────────────────────────────────────────────────────────
  # Hero stack: "19 960" number row measured at y=510-540, x=380-590
  hero_stack:
    x: 380
    y: 510
    width: 210
    height: 30

  # HU opponent (top centre) — "19 190" measured at y=118-140, x=340-560
  villain_1_stack:
    x: 340
    y: 118
    width: 220
    height: 22

  # 6-max seats (unused in HU but kept for multi-table)
  villain_2_stack:
    x: 180
    y: 310
    width: 130
    height: 30

  villain_3_stack:
    x: 490
    y: 65
    width: 130
    height: 30

  villain_4_stack:
    x: 760
    y: 310
    width: 130
    height: 30

  villain_5_stack:
    x: 760
    y: 460
    width: 130
    height: 30

  # ── Action buttons ────────────────────────────────────────────────────────
  # NOTE: detect_action_buttons() / _detect_buttons_by_color() takes priority.
  # These YAML coords are a FALLBACK only.
  # Measured from live blob detection at strip_y0=609 (70%):
  # 2-button layout: Чек at (638,618,159,69), Рейз at (799,618,158,69)
  # 3-button layout: Fold would be ~160px to the left of Чек ≈ (477,618)
  fold_button:
    x: 477
    y: 618
    width: 158
    height: 69

  check_button:
    x: 638
    y: 618
    width: 159
    height: 69

  call_button:
    x: 638
    y: 618
    width: 159
    height: 69

  raise_button:
    x: 799
    y: 618
    width: 158
    height: 69

  # ── Bet amount input (slider row, above buttons) ──────────────────────────
  bet_amount_field:
    x: 900
    y: 730
    width: 140
    height: 32

# Visual characteristics (BGR)
colors:
  table_felt: [53, 101, 77]
  card_back: [42, 68, 123]
  button_active_red: [34, 34, 204]      # BGR for modern PS action buttons (#CC2233)
  button_active_green: [50, 180, 50]   # BGR for legacy green buttons

# OCR settings
ocr:
  pot_prefix: "Банк:"
  bet_prefix: ""
  stack_suffix: ""
  decimal_separator: "."
  thousands_separator: " "

# Card recognition (within the card ROI image)
cards:
  rank_height: 22
  suit_height: 18
  rank_y_offset: 8
  suit_y_offset: 32

# Metadata
metadata:
  table_type_indicator:
    x: 50
    y: 20
    width: 200
    height: 30

  street_indicator:
    x: 450
    y: 200
    width: 200
    height: 30
