# anchor_templates.yaml — roadmap13 Phase 1
# 10 anchor templates for fully automatic ROI detection.
#
# Each anchor:
#   file:       Template image path (relative to project root)
#   threshold:  Min match confidence for cv2.matchTemplate (0.0–1.0)
#   zone:       Semantic zone name
#   relative:   Expected relative position in window (0.0–1.0)
#   roi_offsets: ROI zones derived from anchor position {name: {dx, dy, w, h}}
#   scales:     Optional list of scales for multi-scale matching (default [1.0])

anchors:
  logo_coinpoker:
    file: "templates/anchors/logo_coinpoker.png"
    threshold: 0.70
    zone: "top_header"
    scales: [0.8, 0.9, 1.0, 1.1, 1.2]
    relative:
      x_min: 0.0
      y_min: 0.0
      x_max: 0.3
      y_max: 0.08
    roi_offsets:
      board_center:
        dx: 200
        dy: 250
        w: 350
        h: 80

  btn_fold:
