# Derived ROI zones from anchor combinations
derived_zones:
  board:
    description: "Community cards (5 cards on the board)"
    primary_anchor: "logo_coinpoker"
    secondary_anchor: "btn_fold"
    method: "midpoint_vertical"

  hero_cards:
    description: "Hero's hole cards (2 cards)"
    primary_anchor: "btn_fold"
    method: "offset_from_anchor"

  pot:
    description: "Pot size display"
    primary_anchor: "pot_icon"
    fallback_anchor: "btn_call"
    method: "offset_from_anchor"

  hero_stack:
    description: "Hero's chip stack"
    primary_anchor: "chip_icon"
    fallback_anchor: "btn_check"
    method: "offset_from_anchor"

  action_buttons:
    description: "Fold / Call / Check / Raise buttons row"
    anchors: ["btn_fold", "btn_call", "btn_check", "btn_raise"]
    method: "bounding_box"

  opponent_area:
    description: "Area with opponent seats"
    primary_anchor: "table_border"
    method: "offset_from_anchor"

  table_bounds:
    description: "Full table area from corner to corner"
    anchors: ["table_corner", "table_border"]
    method: "bounding_box"

  dealer_zone:
    description: "Dealer button area"
    primary_anchor: "dealer_button"
    method: "offset_from_anchor"
